name: Validate SBOM

on:
  push:
    paths:
      - "sbom/**"
      - ".github/workflows/sbom-validate.yml"
  pull_request:
    paths:
      - "sbom/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate CycloneDX SBOM(s) against the official schema
        run: |
          set -e
          for f in sbom/*.cdx.json; do
            echo "::group::Validating $f"
            docker run --rm -v "$PWD":/data cyclonedx/cyclonedx-cli:latest \
              validate --input-file "/data/$f" --input-format json --fail-on-errors
            echo "::endgroup::"
          done

      - name: Sanity checks (format + every component has a license)
        run: |
          python - <<'PY'
          import json, glob, sys
          ok = True
          for f in glob.glob("sbom/*.cdx.json"):
              d = json.load(open(f, encoding="utf-8"))
              assert d.get("bomFormat") == "CycloneDX", f
              assert d.get("specVersion") == "1.5", f
              for c in d.get("components", []):
                  if not c.get("licenses"):
                      print(f"::warning file={f}::component '{c.get('name')}' has no license")
                      ok = False
              print(f"{f}: {len(d.get('components', []))} components, format OK")
          sys.exit(0 if ok else 1)
          PY
